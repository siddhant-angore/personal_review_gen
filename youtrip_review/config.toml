# ── YouTrip Review Configuration ───────────────────────────────────
# Fill in your details below, then run:  uv run youtrip-review
# ───────────────────────────────────────────────────────────────────

[github]
username = "siddhantangore"                              # your GitHub username
repo     = "yougroupteam/u-mobile"         # owner/repo

[git]
author_name = "siddhant"                           # git commit author name (partial match works)
repo_path   = "/Users/siddhant.angore/Documents/GitHub/u-mobile"                           # absolute path to your local u-mobile clone

[jira]
username         = "siddhant.angore@you.co"                      # your JIRA email (e.g. name@you.co)
base_url         = "https://yougroup.atlassian.net"
exclude_projects = ["TEST"]                # JIRA projects to ignore

[period]
start = "2025-04-01"                       # any start date (YYYY-MM-DD)
end   = "2026-03-31"                       # any end date (YYYY-MM-DD)

[output]
dir = "./review_output"                    # where to write CSVs and markdown
